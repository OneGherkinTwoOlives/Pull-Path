<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consultant Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="portal.css" />
  </head>
  <body>
    <main class="portal-main">
      <section class="portal-card">
        <div class="workspace-header-row">
          <h1>Consultant Workspace</h1>
          <button id="logout-btn" class="secondary-btn" type="button">Logout</button>
        </div>
        <p id="consultant-email" class="muted"></p>
        <h2>Assigned Projects</h2>
        <ul id="consultant-project-list" class="project-list"></ul>
        <p id="consultant-empty" class="muted">No project assignments found.</p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="data-store.js"></script>
    <script src="auth.js"></script>
    <script src="consultant-workspace.js"></script>
  </body>
</html>
