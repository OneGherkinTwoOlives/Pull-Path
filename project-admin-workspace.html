<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="portal.css?v=3" />
  </head>
  <body>
    <main class="portal-main">
      <div class="portal-stack">
        <img class="portal-top-logo" src="Logo-Vector.png" alt="Pull Path" />
        <section class="portal-card">
          <div class="workspace-header-row">
            <h1>Project Workspace</h1>
            <div class="workspace-actions">
              <button id="create-project-btn" class="primary-btn" type="button">Create New Project</button>
              <a class="secondary-link action-link" href="account-settings.html">Account Settings</a>
              <button id="logout-btn" class="secondary-btn" type="button">Logout</button>
            </div>
          </div>
          <p id="project-admin-email" class="muted"></p>
          <section class="workspace-section">
            <h2>Admin Projects</h2>
            <ul id="project-admin-project-list" class="project-list"></ul>
            <p id="project-admin-empty" class="muted">No projects are assigned to this administrator.</p>
          </section>
          <section class="workspace-section">
            <h2>Contributor Projects</h2>
            <ul id="project-contributor-project-list" class="project-list"></ul>
            <p id="project-contributor-empty" class="muted">No contributor projects are assigned to this user.</p>
          </section>
        </section>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="data-store.js"></script>
    <script src="auth.js"></script>
    <script src="project-admin-workspace.js"></script>
  </body>
</html>
