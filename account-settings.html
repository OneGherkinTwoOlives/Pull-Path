<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="portal.css?v=6" />
  </head>
  <body>
    <main class="portal-main">
      <div class="portal-stack">
        <img class="portal-top-logo" src="Logo-Vector.png" alt="Pull Path" />
        <section class="portal-card settings-page-card">
          <div class="settings-card-header">
            <div class="settings-meta">
              <h1>Account Settings</h1>
              <p id="account-settings-email" class="muted"></p>
            </div>
            <div class="settings-actions">
              <a id="account-settings-back-link" class="secondary-link action-link" href="index.html">Back</a>
              <button id="open-password-modal-btn" class="secondary-btn" type="button">Change Password</button>
              <button id="account-settings-logout-btn" class="secondary-btn" type="button">Logout</button>
            </div>
          </div>

          <section class="settings-section">
            <h2>Profile Information</h2>
            <form id="account-contact-form" class="project-form">
              <div class="field-row signup-grid-row">
                <label class="field">
                  <span>Company</span>
                  <input id="account-company" type="text" />
                </label>
              </div>
              <div class="field-row signup-grid-row settings-profile-row discipline-trade-row">
                <label class="field">
                  <span>Discipline/Trade</span>
                  <select id="account-discipline">
                    <option value="">Select Discipline/Trade</option>
                  </select>
                </label>
                <label class="field field-subset" id="discipline-other-field">
                  <span>Specify Other</span>
                  <input id="account-discipline-other" type="text" placeholder="Enter your discipline/trade" />
                </label>
              </div>
              <div class="field-row signup-grid-row settings-profile-row">
                <label class="field">
                  <span>Name</span>
                  <input id="account-name" type="text" />
                </label>
                <label class="field">
                  <span>Email</span>
                  <input id="account-email" type="email" />
                </label>
              </div>
              <div class="field-row signup-grid-row settings-profile-row">
                <label class="field">
                  <span>Phone Number</span>
                  <input id="account-phone" type="tel" />
                </label>
                <label class="field">
                  <span>Address</span>
                  <textarea id="account-address" rows="3"></textarea>
                </label>
              </div>
              <div id="account-contact-status" class="csv-status" aria-live="polite"></div>
              <div class="actions-row auth-actions">
                <button class="primary-btn" type="submit">Save Profile</button>
              </div>
            </form>
          </section>
        </section>
      </div>

      <div id="password-modal" class="modal-backdrop" hidden>
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="password-modal-title">
          <div class="modal-header">
            <div>
              <h2 id="password-modal-title">Change Password</h2>
              <p class="muted">Update your Pull Path account password.</p>
            </div>
            <button id="close-password-modal-btn" class="modal-close-btn" type="button" aria-label="Close">×</button>
          </div>
          <form id="password-form" class="project-form">
            <label class="field">
              <span>New Password</span>
              <input id="account-new-password" type="password" autocomplete="new-password" required />
            </label>
            <label class="field">
              <span>Confirm New Password</span>
              <input id="account-confirm-password" type="password" autocomplete="new-password" required />
            </label>
            <p class="field-hint">Password must be at least 6 characters and include one capital letter and one symbol.</p>
            <div id="password-status" class="csv-status" aria-live="polite"></div>
            <div class="actions-row auth-actions">
              <button id="cancel-password-modal-btn" class="secondary-btn" type="button">Cancel</button>
              <button class="primary-btn" type="submit">Update Password</button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="data-store.js?v=2"></script>
    <script src="auth.js?v=13"></script>
    <script src="account-settings.js?v=2"></script>
  </body>
</html>
