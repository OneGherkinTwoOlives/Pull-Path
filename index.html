<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="portal.css?v=2" />
  </head>
  <body>
    <main class="portal-main">
      <div class="portal-stack">
        <img class="portal-top-logo" src="Logo-Vector.png" alt="Pull Path" />
        <section class="portal-card">
          <div class="workspace-header-row">
            <h1>Super Administrator Workspace</h1>
            <div class="workspace-actions">
              <a id="administrator-link" class="secondary-link action-link" href="administrator.html">Administrator Page</a>
              <a class="secondary-link action-link" href="account-settings.html">Account Settings</a>
              <button id="logout-btn" class="secondary-btn" type="button">Logout</button>
            </div>
          </div>
          <div class="portal-grid">
            <div class="portal-col">
              <h2>Current Projects</h2>
              <ul id="project-list" class="project-list"></ul>
              <p id="project-empty" class="muted">No projects yet.</p>
            </div>
            <div class="portal-col portal-col-action">
              <button id="create-project-btn" class="primary-btn" type="button">Create New Project</button>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="data-store.js?v=4"></script>
    <script src="auth.js?v=16"></script>
    <script src="landing.js?v=2"></script>
  </body>
</html>
